name: todago
description: TodaGo - Premium Tricycle Hailing App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0+1
  cupertino_icons: ^1.0.2

  # Map (Free — OpenStreetMap, no API key needed)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Location & GPS
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # Local Notifications (permission prompts)
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true